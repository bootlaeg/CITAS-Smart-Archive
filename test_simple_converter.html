<!DOCTYPE html>
<html>
<head>
    <title>Test Simple Converter</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
        #result { margin-top: 20px; padding: 15px; border: 1px solid #ddd; background: #f9f9f9; }
        .log { font-family: monospace; white-space: pre-wrap; word-wrap: break-word; }
    </style>
</head>
<body>
    <h1>Test Simple Converter</h1>
    <p>This tests the async response mechanism without complex file operations.</p>
    
    <button onclick="testConverter()">Test Simple Converter</button>
    <button onclick="testWithData()">Test With Thesis Data</button>
    
    <div id="result"></div>
    
    <script>
    function log(msg) {
        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML += msg + '\n';
        console.log(msg);
    }
    
    function testConverter() {
        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = '';
        log('⏳ Starting test...');
        log('Time: ' + new Date().toLocaleTimeString());
        
        const startTime = Date.now();
        
        fetch('../ai_includes/simple_test_converter.php', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                thesis_id: 123,
                file_path: 'test.pdf'
            })
        })
        .then(response => {
            const elapsed = Date.now() - startTime;
            log('✅ Response received in ' + (elapsed/1000).toFixed(2) + ' seconds');
            log('Status: ' + response.status);
            return response.json();
        })
        .then(data => {
            log('📦 Parsed data: ' + JSON.stringify(data, null, 2));
            if (data.status === 'processing') {
                log('✅ SUCCESS: Got async response!');
            }
        })
        .catch(error => {
            log('❌ ERROR: ' + error.message);
        });
    }
    
    function testWithData() {
        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = '';
        log('⏳ Testing with full thesis data...');
        
        const startTime = Date.now();
        
        fetch('../ai_includes/simple_test_converter.php', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                thesis_id: 110,
                file_path: 'uploads/thesis_files/thesis_110.pdf',
                title: 'Test Thesis',
                author: 'Test Author'
            })
        })
        .then(response => {
            const elapsed = Date.now() - startTime;
            log('✅ Response received in ' + (elapsed/1000).toFixed(2) + ' seconds');
            return response.json();
        })
        .then(data => {
            log('📦 Response: ' + JSON.stringify(data, null, 2));
        })
        .catch(error => {
            log('❌ ERROR: ' + error.message);
        });
    }
    </script>
</body>
</html>
